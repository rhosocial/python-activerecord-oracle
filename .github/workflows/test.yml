# .github/workflows/test.yml
name: Python Test with Oracle

on:
push:
branches:
- main
- "release/v**"
- "maint/**"
pull_request:
branches:
- main
- "release/v**"
- "maint/**"

permissions:
contents: read

jobs:
# Python 3.9 tests
test-py39-oracle19c:
name: Run tests with Python 3.9 and Oracle 19c
runs-on: ubuntu-latest
services:
oracle:
image: gvenzl/oracle-xe:19-slim
env:
ORACLE_PASSWORD: password
options: >-
--health-cmd "echo 'SELECT 1 FROM dual' | sqlplus -S system/password@//localhost/XEPDB1"
--health-interval 30s
--health-timeout 60s
--health-retries 15
ports:
- 1521:1521

steps:
- name: Check out the repository
uses: actions/checkout@v6

- name: Set up Python 3.9
uses: actions/setup-python@v6
with:
python-version: "3.9"

- name: Install dependencies
run: |
pip install -r requirements.txt
pip install -r requirements-dev.txt

- name: Install activerecord and testsuite from PyPI
run: |
pip install git+https://github.com/rhosocial/python-activerecord.git@release/v1.0.0.dev26#egg=rhosocial-activerecord
        pip install git+https://github.com/rhosocial/python-activerecord-testsuite.git@release/v1.0.0.dev13#egg=rhosocial-activerecord-testsuite

- name: Test Oracle connectivity
run: |
python -c "
import sys
import time
import oracledb

max_retries = 30
for attempt in range(max_retries):
try:
connection = oracledb.connect(
user='system',
password='password',
dsn='localhost:1521/XEPDB1'
)
cursor = connection.cursor()
cursor.execute('SELECT 1 FROM dual')
result = cursor.fetchone()
print(f'Oracle connectivity test passed: {result[0]}')
cursor.close()
connection.close()
break
except oracledb.ConnectionError as e:
if attempt < max_retries - 1:
print(f'Retry {attempt + 1}/{max_retries}: {e}')
time.sleep(10)
else:
print(f'Failed after {max_retries} attempts: {e}')
sys.exit(1)
"

- name: Create Oracle scenario config
run: |
cat > oracle_scenarios.yaml << EOF
scenarios:
oracle_19c:
host: localhost
port: 1521
username: system
password: password
service_name: XEPDB1
encoding: AL32UTF8
EOF
echo "ORACLE_SCENARIOS_CONFIG_PATH=$(pwd)/oracle_scenarios.yaml" >> $GITHUB_ENV

- name: Run tests
run: |
export PYTHONPATH=src
python -m pytest tests/

